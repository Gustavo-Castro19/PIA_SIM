<div class="br-modal" role="dialog" aria-modal="true">
    <div class="br-modal__content">
        <!-- Header -->
        <div class="br-modal__header">
            <h2 class="br-modal__title">{{ tituloModal }}</h2>
            <button class="br-button icon-only secondary" type="button" (click)="fecharModal()"
                aria-label="Fechar modal">
                <i class="fas fa-times" aria-hidden="true"></i>
            </button>
        </div>

        <!-- Body -->
        <div class="br-modal__body">
            <form [formGroup]="formulario" (ngSubmit)="enviarFormulario()">

                <!-- Modo Criar -->
                <ng-container *ngIf="modo === 'criar'">
                    <div class="br-input mb-3">
                        <label for="titulo">Título *</label>
                        <input id="titulo" type="text" placeholder="Título do registro" formControlName="titulo"
                            maxlength="300"
                            [class.is-invalid]="formulario.get('titulo')?.invalid && formulario.get('titulo')?.touched" />
                        <div class="error-messages"
                            *ngIf="formulario.get('titulo')?.invalid && formulario.get('titulo')?.touched">
                            <p class="error" *ngFor="let erro of obterErrosTitulo()">{{ erro }}</p>
                        </div>
                    </div>

                    <div class="br-textarea mb-3">
                        <label for="descricaoAnonimizada">Descrição anonimizada *</label>
                        <textarea id="descricaoAnonimizada" rows="5"
                            placeholder="Descreva o caso sem dados pessoais identificáveis"
                            formControlName="descricaoAnonimizada" maxlength="5000"
                            [class.is-invalid]="formulario.get('descricaoAnonimizada')?.invalid && formulario.get('descricaoAnonimizada')?.touched"></textarea>
                        <div class="error-messages"
                            *ngIf="formulario.get('descricaoAnonimizada')?.invalid && formulario.get('descricaoAnonimizada')?.touched">
                            <p class="error" *ngFor="let erro of obterErrosDescricao()">{{ erro }}</p>
                        </div>
                    </div>

                    <div class="br-select mb-3">
                        <label for="tipoFraude">Tipo de fraude *</label>
                        <select id="tipoFraude" formControlName="tipoFraude"
                            [class.is-invalid]="formulario.get('tipoFraude')?.invalid && formulario.get('tipoFraude')?.touched">
                            <option value="" disabled>Selecione o tipo</option>
                            <option *ngFor="let opcao of opcoesTipoFraude" [value]="opcao.value">
                                {{ opcao.label }}
                            </option>
                        </select>
                    </div>
                </ng-container>

                <!-- Modo Editar -->
                <ng-container *ngIf="modo === 'editar'">
                    <div class="br-select mb-3">
                        <label for="grauInteresse">Grau de interesse *</label>
                        <select id="grauInteresse" formControlName="grauInteresse">
                            <option *ngFor="let opcao of opcoesGrauInteresse" [value]="opcao.value">
                                {{ opcao.label }}
                            </option>
                        </select>
                    </div>

                    <div class="br-select mb-3">
                        <label for="status">Status *</label>
                        <select id="status" formControlName="status">
                            <option *ngFor="let opcao of opcoesStatus" [value]="opcao.value">
                                {{ opcao.label }}
                            </option>
                        </select>
                    </div>
                </ng-container>

            </form>
        </div>

        <!-- Footer -->
        <div class="br-modal__footer">
            <button class="br-button secondary" type="button" (click)="fecharModal()">
                Cancelar
            </button>
            <button class="br-button primary" type="button" (click)="enviarFormulario()"
                [disabled]="formulario.invalid">
                {{ textoBotaoPrincipal }}
            </button>
        </div>
    </div>
</div>

<!-- Backdrop -->
<div class="br-modal__backdrop" (click)="fecharModal()"></div>
